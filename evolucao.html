<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolução da Homologação - CAF (DM-209196)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --azul-escuro: #1a5276;
            --azul-medio: #2980b9;
            --azul-claro: #5dade2;
            --ciano: #00bcd4;
            --verde: #7cb342;
            --verde-claro: #aed581;
            --amarelo: #f9a825;
            --laranja: #f57c00;
            --cinza-texto: #2d2d2d;
            --cinza-claro: #f5f7fa;
            --branco: #ffffff;
            --sombra: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, sans-serif;
            background: var(--cinza-claro);
            color: var(--cinza-texto);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul-medio) 50%, var(--ciano) 100%);
            color: var(--branco);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .header-logo img { height: 54px; width: auto; border-radius: 6px; }
        .header-divider { width: 2px; height: 44px; background: rgba(255,255,255,0.3); }
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { font-size: 18px; font-weight: 600; }
        .header-title p { font-size: 13px; opacity: 0.85; font-weight: 300; }

        .nav-bar {
            background: var(--branco);
            padding: 12px 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            gap: 8px;
        }

        .nav-link {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            color: var(--cinza-texto);
            border: 1px solid #e5e7eb;
            transition: all 0.2s;
        }

        .nav-link:hover { background: #f3f4f6; }
        .nav-link.active { background: var(--azul-medio); color: var(--branco); border-color: var(--azul-medio); }

        .main { max-width: 1440px; margin: 0 auto; padding: 32px 40px; }

        .section-title {
            font-size: 18px; font-weight: 700; color: var(--azul-escuro);
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, var(--ciano), var(--azul-medio)); border-radius: 2px; }

        .chart-card {
            background: var(--branco); border-radius: var(--radius);
            padding: 24px; box-shadow: var(--sombra); margin-bottom: 32px;
        }
        .chart-card h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
        .chart-container { position: relative; height: 350px; }
        .chart-container-tall { position: relative; height: 420px; }

        .timeline { margin-bottom: 32px; }

        .timeline-day {
            background: var(--branco);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--sombra);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 24px;
            transition: transform 0.2s;
        }

        .timeline-day:hover { transform: translateX(4px); }
        .timeline-day.atual { border-left: 4px solid var(--azul-medio); }

        .timeline-date {
            min-width: 100px;
            text-align: center;
            border-right: 2px solid #e5e7eb;
            padding-right: 20px;
        }

        .timeline-date .day { font-size: 22px; font-weight: 800; color: var(--azul-escuro); }
        .timeline-date .month { font-size: 11px; color: #6b7280; text-transform: uppercase; font-weight: 600; }
        .timeline-date .time { font-size: 10px; color: #9ca3af; margin-top: 2px; }

        .timeline-stats {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            flex: 1;
        }

        .timeline-stat {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            background: #f8fafc;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .timeline-stat .stat-dot { width: 8px; height: 8px; border-radius: 50%; }
        .timeline-stat .stat-value { font-weight: 700; }

        .timeline-total {
            min-width: 60px;
            text-align: right;
        }

        .timeline-total .total-value { font-size: 20px; font-weight: 800; color: var(--azul-medio); }
        .timeline-total .total-label { font-size: 10px; color: #6b7280; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
        }

        .empty-state h3 { font-size: 18px; color: var(--azul-escuro); margin-bottom: 8px; }

        .footer {
            background: var(--azul-escuro); color: rgba(255,255,255,0.7);
            text-align: center; padding: 20px 40px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 16px;
        }
        .footer img { height: 40px; border-radius: 4px; }
        .footer strong { color: var(--branco); }

        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 16px; padding: 20px; }
            .main { padding: 20px; }
            .timeline-day { flex-direction: column; align-items: flex-start; }
            .timeline-date { border-right: none; border-bottom: 1px solid #e5e7eb; padding-right: 0; padding-bottom: 12px; width: 100%; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">
                <img src="Logo_dataprev_Preferencial-01.jpg" alt="DATAPREV">
            </div>
            <div class="header-divider"></div>
            <div class="header-title">
                <h1>Evolução da Homologação — CAF</h1>
                <p>Cadastro Nacional da Agricultura Familiar • DM-209196</p>
            </div>
        </div>
    </header>

    <nav class="nav-bar">
        <a href="index.html" class="nav-link">📊 Visão Atual</a>
        <a href="evolucao.html" class="nav-link active">📈 Evolução</a>
    </nav>

    <main class="main" id="main-content">
        <div class="loading" style="display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:16px;">
            <div style="width:48px;height:48px;border:4px solid #e5e7eb;border-top-color:#2980b9;border-radius:50%;animation:spin 1s linear infinite;"></div>
            <p style="font-size:14px;color:#6b7280;">Carregando dados da planilha...</p>
        </div>
    </main>

    <footer class="footer">
        <img src="Logo_dataprev_Preferencial-01.jpg" alt="DATAPREV">
        <p><strong>DATAPREV</strong> — Dados para cidadania • Homologação CAF DM-209196</p>
    </footer>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

    <script>
        const XLSX_FILE = 'CAF.xlsx';

        // Cores para cada status
        const STATUS_COLORS = {
            'Pendente de cenário': '#e65100',
            'Em Correção': '#f57f17',
            'Em Análise': '#1565c0',
            'Homologado com sucesso': '#2e7d32',
            'Homologado com ressalva': '#7cb342',
            'Disponível para reteste': '#00bcd4',
            'Reprovado': '#c62828'
        };

        function getStatusColor(status) {
            return STATUS_COLORS[status] || '#78909c';
        }

        async function loadData() {
            try {
                const response = await fetch(XLSX_FILE + '?t=' + Date.now());
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });

                // Encontrar aba ResumoDiario
                const sheetName = workbook.SheetNames.find(n => n.toLowerCase().includes('resumo'));
                if (!sheetName) throw new Error('Aba ResumoDiario não encontrada na planilha');

                const sheet = workbook.Sheets[sheetName];
                const data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                if (data.length < 2) throw new Error('Aba ResumoDiario está vazia');

                // Headers (linha 1)
                const headers = data[0].map(h => (h || '').toString().trim());

                // Identificar colunas
                const colHora = headers.findIndex(h => h.toLowerCase() === 'hora');
                const colData = headers.findIndex(h => h.toLowerCase() === 'data');
                const colTotal = headers.findIndex(h => h.toLowerCase() === 'total');

                // Colunas de status (tudo que não é hora, data ou total)
                const statusCols = [];
                headers.forEach((h, i) => {
                    if (i !== colHora && i !== colData && i !== colTotal && h !== '') {
                        statusCols.push({ index: i, name: h });
                    }
                });

                // Ler registros (só linhas com data preenchida)
                const registros = [];
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (!row) continue;

                    let dataVal = colData >= 0 ? row[colData] : '';
                    let horaVal = colHora >= 0 ? row[colHora] : '';
                    
                    // Converter hora serial do Excel para formato legível
                    if (typeof horaVal === 'number') {
                        const totalMinutes = Math.round(horaVal * 24 * 60);
                        const hours = Math.floor(totalMinutes / 60);
                        const minutes = totalMinutes % 60;
                        horaVal = `${String(hours).padStart(2,'0')}:${String(minutes).padStart(2,'0')}`;
                    } else {
                        horaVal = (horaVal || '').toString().trim();
                    }

                    // Converter serial number do Excel para data legível
                    if (typeof dataVal === 'number') {
                        const utcDays = dataVal - 25569;
                        const date = new Date(Date.UTC(1970, 0, 1 + utcDays));
                        const dd = String(date.getUTCDate()).padStart(2, '0');
                        const mm = String(date.getUTCMonth() + 1).padStart(2, '0');
                        const yyyy = date.getUTCFullYear();
                        dataVal = `${dd}/${mm}/${yyyy}`;
                    } else {
                        dataVal = (dataVal || '').toString().trim();
                    }

                    if (!dataVal) continue; // pula linhas sem data

                    const registro = {
                        data: dataVal,
                        hora: horaVal,
                        status: {},
                        total: 0
                    };

                    statusCols.forEach(col => {
                        const val = parseInt(row[col.index]) || 0;
                        registro.status[col.name] = val;
                    });

                    registro.total = colTotal >= 0 ? (parseInt(row[colTotal]) || 0) : Object.values(registro.status).reduce((a, b) => a + b, 0);

                    if (registro.total > 0) {
                        registros.push(registro);
                    }
                }

                if (registros.length === 0) throw new Error('Nenhum registro com dados encontrado na aba ResumoDiario');

                renderEvolucao(registros, statusCols.map(c => c.name));

            } catch (error) {
                console.error(error);
                document.getElementById('main-content').innerHTML = `
                    <div class="empty-state">
                        <h3>❌ Erro ao carregar dados</h3>
                        <p>${error.message}</p>
                    </div>`;
            }
        }

        function renderEvolucao(registros, statusNames) {
            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            // Ordenar por data
            registros.sort((a, b) => {
                const parseDate = (d) => {
                    const parts = d.split('/');
                    if (parts.length === 3) return new Date(parts[2], parts[1]-1, parts[0]);
                    return new Date(d);
                };
                return parseDate(a.data) - parseDate(b.data);
            });

            // GRÁFICO DE EVOLUÇÃO
            mainContent.innerHTML += `
                <div class="chart-card">
                    <h3>Evolução Diária da Homologação</h3>
                    <div class="chart-container-tall"><canvas id="chartEvolucao"></canvas></div>
                </div>`;

            const labels = registros.map(r => r.data);

            const datasets = statusNames.map(status => ({
                label: status,
                data: registros.map(r => r.status[status] || 0),
                borderColor: getStatusColor(status),
                backgroundColor: getStatusColor(status) + '15',
                fill: false,
                tension: 0.3,
                borderWidth: 3,
                pointRadius: 5,
                pointBackgroundColor: getStatusColor(status),
                pointBorderColor: '#fff',
                pointBorderWidth: 2
            }));

            setTimeout(() => {
                const ctx = document.getElementById('chartEvolucao');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'bar',
                        data: { labels, datasets: statusNames.map(status => ({
                            label: status,
                            data: registros.map(r => r.status[status] || 0),
                            backgroundColor: getStatusColor(status),
                            borderColor: getStatusColor(status),
                            borderWidth: 1,
                            borderRadius: 4
                        })) },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { mode: 'index', intersect: false },
                            plugins: {
                                legend: { position: 'top', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, padding: 16, usePointStyle: true, pointStyle: 'rect' } },
                                tooltip: { mode: 'index', intersect: false }
                            },
                            scales: {
                                x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 12, weight: '600' } } },
                                y: { grid: { color: '#f3f4f6' }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, stepSize: 2 }, beginAtZero: true }
                            }
                        }
                    });
                }
            }, 100);

            // COMPARAÇÃO ENTRE DIAS (tabela de variação)
            if (registros.length >= 2) {
                let compHtml = `<div class="chart-card">
                    <h3>Variação entre Dias</h3>
                    <table style="width:100%;border-collapse:collapse;font-size:13px;">
                        <thead style="background:#f8fafc;">
                            <tr>
                                <th style="padding:10px 12px;text-align:left;font-size:11px;text-transform:uppercase;border-bottom:2px solid #e5e7eb;">Status</th>`;

                registros.forEach(r => {
                    compHtml += `<th style="padding:10px 12px;text-align:center;font-size:11px;border-bottom:2px solid #e5e7eb;">${r.data}</th>`;
                });
                compHtml += `</tr></thead><tbody>`;

                statusNames.forEach(status => {
                    compHtml += `<tr><td style="padding:8px 12px;border-bottom:1px solid #f3f4f6;font-weight:600;">
                        <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${getStatusColor(status)};margin-right:8px;vertical-align:middle;"></span>${status}</td>`;

                    registros.forEach((r, idx) => {
                        const val = r.status[status] || 0;
                        let diff = '';
                        if (idx > 0) {
                            const prev = registros[idx-1].status[status] || 0;
                            const delta = val - prev;
                            if (delta > 0) diff = `<span style="color:#2e7d32;font-size:10px;margin-left:4px;">▲${delta}</span>`;
                            else if (delta < 0) diff = `<span style="color:#c62828;font-size:10px;margin-left:4px;">▼${Math.abs(delta)}</span>`;
                        }
                        compHtml += `<td style="padding:8px 12px;text-align:center;border-bottom:1px solid #f3f4f6;">${val}${diff}</td>`;
                    });
                    compHtml += `</tr>`;
                });

                // Linha de total
                compHtml += `<tr style="font-weight:700;background:#f8fafc;"><td style="padding:8px 12px;">Total</td>`;
                registros.forEach(r => {
                    compHtml += `<td style="padding:8px 12px;text-align:center;">${r.total}</td>`;
                });
                compHtml += `</tr></tbody></table></div>`;
                mainContent.innerHTML += compHtml;
            }

            // TIMELINE
            mainContent.innerHTML += `<div class="section-title">Detalhamento por Dia</div><div class="timeline" id="timeline"></div>`;

            const timelineEl = document.getElementById('timeline');
            timelineEl.innerHTML = registros.slice().reverse().map((r, idx) => {
                const isLast = idx === 0;

                const statsHtml = Object.entries(r.status)
                    .filter(([, count]) => count > 0)
                    .map(([status, count]) => `
                        <div class="timeline-stat">
                            <div class="stat-dot" style="background:${getStatusColor(status)}"></div>
                            <span class="stat-value">${count}</span> ${status}
                        </div>
                    `).join('');

                return `<div class="timeline-day ${isLast ? 'atual' : ''}">
                    <div class="timeline-date">
                        <div class="day">${r.data}</div>
                        <div class="time">${r.hora}</div>
                    </div>
                    <div class="timeline-stats">${statsHtml}</div>
                    <div class="timeline-total">
                        <div class="total-value">${r.total}</div>
                        <div class="total-label">total</div>
                    </div>
                </div>`;
            }).join('');
        }

        loadData();
    </script>
</body>
</html>
