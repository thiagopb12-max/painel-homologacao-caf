<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Homologação - CAF (DM-209196)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --azul-escuro: #1a5276;
            --azul-medio: #2980b9;
            --azul-claro: #5dade2;
            --ciano: #00bcd4;
            --ciano-claro: #4dd0e1;
            --verde: #7cb342;
            --verde-claro: #aed581;
            --amarelo: #f9a825;
            --laranja: #f57c00;
            --cinza-texto: #2d2d2d;
            --cinza-claro: #f5f7fa;
            --branco: #ffffff;
            --sombra: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, sans-serif;
            background: var(--cinza-claro);
            color: var(--cinza-texto);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul-medio) 50%, var(--ciano) 100%);
            color: var(--branco);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .header-logo img { height: 54px; width: auto; border-radius: 6px; }

        .header-divider { width: 2px; height: 44px; background: rgba(255,255,255,0.3); }
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { font-size: 18px; font-weight: 600; }
        .header-title p { font-size: 13px; opacity: 0.85; font-weight: 300; }
        .header-right { display: flex; align-items: center; gap: 16px; }

        .header-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 500;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .header-time { font-size: 13px; opacity: 0.9; }

        .tagline-bar {
            background: linear-gradient(90deg, var(--amarelo), var(--verde-claro));
            padding: 6px 40px;
            font-size: 12px;
            font-weight: 600;
            color: var(--azul-escuro);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main { max-width: 1440px; margin: 0 auto; padding: 32px 40px; }

        .loading {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 80px 20px; gap: 16px;
        }

        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid #e5e7eb; border-top-color: var(--azul-medio);
            border-radius: 50%; animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { font-size: 14px; color: #6b7280; }

        .refresh-info {
            background: var(--branco); border-radius: var(--radius);
            padding: 12px 24px; box-shadow: var(--sombra); margin-bottom: 24px;
            display: flex; align-items: center; justify-content: space-between;
            font-size: 13px; color: #6b7280;
        }

        .refresh-info button {
            background: var(--azul-medio); color: var(--branco); border: none;
            border-radius: 8px; padding: 8px 20px; font-size: 13px; font-weight: 600;
            font-family: inherit; cursor: pointer; transition: background 0.2s;
        }
        .refresh-info button:hover { background: var(--azul-escuro); }

        /* Status cards - primeira seção */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .status-card {
            background: var(--branco);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: var(--sombra);
            border-left: 5px solid #90a4ae;
            text-align: center;
            transition: transform 0.2s;
        }

        .status-card:hover { transform: translateY(-2px); }

        .status-card .status-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .status-card .status-count {
            font-size: 32px;
            font-weight: 800;
            color: var(--azul-escuro);
        }

        .status-card .status-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        .status-card.st-homologado { border-left-color: #2e7d32; }
        .status-card.st-homologado .status-label { color: #2e7d32; }
        .status-card.st-ressalvas { border-left-color: #f57f17; }
        .status-card.st-ressalvas .status-label { color: #f57f17; }
        .status-card.st-em-homologacao { border-left-color: #1565c0; }
        .status-card.st-em-homologacao .status-label { color: #1565c0; }
        .status-card.st-aguardando { border-left-color: #e65100; }
        .status-card.st-aguardando .status-label { color: #e65100; }
        .status-card.st-reprovado { border-left-color: #c62828; }
        .status-card.st-reprovado .status-label { color: #c62828; }
        .status-card.st-cancelado { border-left-color: #6a1b9a; }
        .status-card.st-cancelado .status-label { color: #6a1b9a; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }

        .chart-card {
            background: var(--branco); border-radius: var(--radius);
            padding: 24px; box-shadow: var(--sombra);
        }

        .chart-card.full-width { grid-column: 1 / -1; }

        .chart-card h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
        .chart-container { position: relative; height: 280px; }

        .section-title {
            font-size: 18px; font-weight: 700; color: var(--azul-escuro);
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, var(--ciano), var(--azul-medio)); border-radius: 2px; }

        .homologadores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px; margin-bottom: 32px; }

        .homologador-card {
            background: var(--branco); border-radius: var(--radius);
            padding: 20px; box-shadow: var(--sombra); display: flex; align-items: center; gap: 16px;
        }

        .homologador-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: var(--branco); flex-shrink: 0;
        }

        .homologador-info h4 { font-size: 14px; font-weight: 600; color: var(--cinza-texto); }

        .table-card { background: var(--branco); border-radius: var(--radius); box-shadow: var(--sombra); overflow: hidden; margin-bottom: 32px; }
        .table-header { padding: 20px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .table-header h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); }
        .table-filter { display: flex; gap: 8px; flex-wrap: wrap; }

        .filter-btn {
            padding: 6px 14px; border: 1px solid #e5e7eb; border-radius: 20px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            background: var(--branco); color: var(--cinza-texto); font-family: inherit; transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--azul-medio); color: var(--branco); border-color: var(--azul-medio); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f8fafc; }
        th { padding: 12px 16px; text-align: left; font-weight: 600; color: #4b5563; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
        td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
        tr:hover { background: #f8fafc; }
        tr.cancelado td { opacity: 0.5; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .badge-caracteriza { background: #e8f5e9; color: #2e7d32; }
        .badge-descaracteriza { background: #fbe9e7; color: #c62828; }
        .badge-pendente { background: #fff3e0; color: #e65100; }
        .badge-nao-impeditivo { background: #e3f2fd; color: #1565c0; }
        .badge-nao-avaliado { background: #f3e5f5; color: #6a1b9a; }

        .grupo-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; background: #e8eaf6; color: #3949ab; }

        .progress-section { margin-bottom: 32px; }
        .progress-bar-container { background: var(--branco); border-radius: var(--radius); padding: 24px; box-shadow: var(--sombra); }
        .progress-bar-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-bar-title h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); }
        .progress-bar-title span { font-size: 24px; font-weight: 800; color: var(--azul-medio); }
        .progress-bar { height: 14px; background: #e5e7eb; border-radius: 7px; overflow: hidden; display: flex; }
        .progress-segment { height: 100%; transition: width 0.5s ease; }
        .progress-legend { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .footer {
            background: var(--azul-escuro); color: rgba(255,255,255,0.7);
            text-align: center; padding: 20px 40px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 16px;
        }
        .footer svg { height: 32px; width: auto; }
        .footer strong { color: var(--branco); }

        @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 16px; padding: 20px; } .main { padding: 20px; } .status-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">
                <img src="Logo_dataprev_Preferencial-01.jpg" alt="DATAPREV">
            </div>
            <div class="header-divider"></div>
            <div class="header-title">
                <h1>Painel de Homologação — CAF</h1>
                <p>Cadastro Nacional da Agricultura Familiar • DM-209196</p>
            </div>
        </div>
        <div class="header-right">
            <div class="header-badge">🔴 AO VIVO</div>
            <div class="header-time" id="current-time"></div>
        </div>
    </header>

    <div class="tagline-bar">
        <span>Dados para cidadania</span>
        <span>•</span>
        <span>Acompanhamento em tempo real da homologação</span>
    </div>

    <main class="main" id="main-content">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Carregando dados da planilha...</p>
        </div>
    </main>

    <footer class="footer">
        <img src="Logo_dataprev_Preferencial-01.jpg" alt="DATAPREV" style="height:40px; border-radius: 4px;">
        <p><strong>DATAPREV</strong> — Dados para cidadania • Homologação CAF DM-209196 • Atualizado em <span id="footer-time"></span></p>
    </footer>

    <script>
        const XLSX_FILE = 'CAF.xlsx';
        const REFRESH_INTERVAL = 30000;

        let chartInstances = {};

        // Clock
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'medium' });
            const el1 = document.getElementById('current-time');
            const el2 = document.getElementById('footer-time');
            if (el1) el1.textContent = timeStr;
            if (el2) el2.textContent = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Load spreadsheet
        async function loadSpreadsheet() {
            try {
                const response = await fetch(XLSX_FILE + '?t=' + Date.now());
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                const cenariosData = parseSheetCenarios(workbook);
                const homologadoresData = parseSheetHomologadores(workbook);
                renderDashboard(cenariosData, homologadoresData);
            } catch (error) {
                console.error('Erro ao carregar planilha:', error);
                document.getElementById('main-content').innerHTML = `
                    <div class="loading">
                        <p style="color: #c62828; font-weight: 600;">❌ Erro ao carregar a planilha</p>
                        <p>${error.message}</p>
                        <p style="margin-top: 12px; font-size: 12px; color: #6b7280;">
                            Certifique-se de que o arquivo <strong>CAF.xlsx</strong> está na mesma pasta.<br>
                            Para rodar localmente: <code>python -m http.server 8080</code>
                        </p>
                    </div>`;
            }
        }

        function parseSheetCenarios(workbook) {
            const sheetName = workbook.SheetNames.find(n =>
                n.toLowerCase().includes('cen') || n.toLowerCase().includes('homologa')
            ) || workbook.SheetNames[0];

            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

            const cenarios = [];
            for (const row of json) {
                const numero = row['Número do Cenário'] || row['Numero do Cenario'] || row['Cenário'] || row['Cenario'] || '';
                if (!numero || !numero.toString().startsWith('CT-')) continue;

                // Detectar cancelamento: verificar apenas colunas de controle, não descrição/justificativa
                const colunasExcluidas = ['Descrição', 'Descricao', 'Justificativa de Inclusão', 'Justificativa',
                    'Categoria do Batimento', 'Categoria', 'Classificação Esperada', 'Classificacao Esperada',
                    'Motivo Esperado', 'Motivo', 'Grupo Sugerido', 'Grupo', 'Número do Cenário', 'Numero do Cenario',
                    'Cenário', 'Cenario', 'Homologador'];
                
                const isCancelado = Object.entries(row).some(([key, v]) => {
                    if (colunasExcluidas.some(col => key.toLowerCase().includes(col.toLowerCase()))) return false;
                    return v && v.toString().toUpperCase().trim() === 'CANCELADO';
                });

                cenarios.push({
                    id: numero.toString().trim(),
                    homologador: (row['Homologador'] || '').toString().trim(),
                    status: (row['Status'] || '').toString().trim(),
                    desc: (row['Descrição'] || row['Descricao'] || '').toString().trim(),
                    categoria: (row['Categoria do Batimento'] || row['Categoria'] || '').toString().trim(),
                    classificacao: (row['Classificação Esperada'] || row['Classificacao Esperada'] || '').toString().trim(),
                    motivo: (row['Motivo Esperado'] || row['Motivo'] || '').toString().trim(),
                    grupo: (row['Grupo Sugerido'] || row['Grupo'] || '').toString().trim(),
                    cancelado: isCancelado
                });
            }
            return cenarios;
        }

        function parseSheetHomologadores(workbook) {
            // Look in all sheets for the homologadores table
            for (const sn of workbook.SheetNames) {
                const sheet = workbook.Sheets[sn];
                const allData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                for (let i = 0; i < allData.length; i++) {
                    const row = allData[i];
                    if (!row) continue;
                    const headerStr = row.map(c => (c || '').toString().toLowerCase()).join('|');
                    if (headerStr.includes('nome') && headerStr.includes('status')) {
                        const nomeIdx = row.findIndex(c => c && c.toString().toLowerCase().trim() === 'nome');
                        const statusIdx = row.findIndex(c => c && c.toString().toLowerCase().trim() === 'status');

                        if (nomeIdx >= 0 && statusIdx >= 0) {
                            const homologadores = [];
                            for (let j = i + 1; j < allData.length; j++) {
                                const r = allData[j];
                                if (!r || !r[nomeIdx] || r[nomeIdx].toString().trim() === '') break;
                                homologadores.push({
                                    nome: r[nomeIdx].toString().trim(),
                                    status: (r[statusIdx] || '').toString().trim()
                                });
                            }
                            if (homologadores.length > 0) return homologadores;
                        }
                    }
                }
            }

            return [
                { nome: 'Nicole Campos Otani', status: 'Em Homologação' },
                { nome: 'João Renato Sardinha Antunes', status: 'Homologado com sucesso' },
                { nome: 'Marcelo Caetano Figueredo Santana', status: 'Reprovado' },
                { nome: 'Graziella Sales Xavier', status: 'Cenário cancelado' },
                { nome: 'Gregorio Vinicius de Oliveira Bispo Dias', status: 'Aguardando' },
                { nome: 'Walternilson Guimarães de Souza', status: 'Homologado com ressalvas' }
            ];
        }

        // Render
        function renderDashboard(cenarios, homologadores) {
            const activeCenarios = cenarios.filter(c => !c.cancelado);
            const cancelados = cenarios.filter(c => c.cancelado);

            // Status counts DOS CENÁRIOS (coluna Status da tabela de cenários)
            const cenarioStatusCounts = {};
            cenarios.forEach(c => {
                let st = (c.status || '').trim();
                if (c.cancelado) {
                    st = 'Cancelado';
                } else if (!st) {
                    st = 'Não Iniciado';
                }
                cenarioStatusCounts[st] = (cenarioStatusCounts[st] || 0) + 1;
            });

            const totalCenarios = cenarios.length;

            // Para o progresso dos homologadores - baseado no STATUS DOS CENÁRIOS por homologador
            const homologadoresCenarios = {};
            cenarios.forEach(c => {
                if (c.homologador && c.homologador.trim() !== '') {
                    const nome = c.homologador.trim();
                    if (!homologadoresCenarios[nome]) homologadoresCenarios[nome] = [];
                    let st = (c.status || '').trim();
                    if (!st && c.cancelado) st = 'Cancelado';
                    else if (!st) st = 'Não Iniciado';
                    homologadoresCenarios[nome].push(st);
                }
            });

            // Contar status de todos os cenários alocados
            const progressStatusCounts = {};
            let totalCenariosAlocados = 0;
            Object.values(homologadoresCenarios).forEach(statuses => {
                statuses.forEach(st => {
                    progressStatusCounts[st] = (progressStatusCounts[st] || 0) + 1;
                    totalCenariosAlocados++;
                });
            });

            const cenariosFinalizados = Object.entries(progressStatusCounts)
                .filter(([st]) => {
                    const s = st.toLowerCase();
                    return s.includes('aprovad') || s.includes('ok') || s.includes('pass') || s.includes('sucesso');
                })
                .reduce((acc, [, count]) => acc + count, 0);
            const progressPercent = totalCenariosAlocados > 0 ? Math.round((cenariosFinalizados / totalCenariosAlocados) * 100) : 0;

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            // Refresh bar
            mainContent.innerHTML += `
                <div class="refresh-info">
                    <span>📊 Dados carregados de <strong>CAF.xlsx</strong> — Atualização automática a cada 30s</span>
                    <button onclick="loadSpreadsheet()">🔄 Atualizar Agora</button>
                </div>`;

            // SEÇÃO 1 - Status cards baseados na coluna STATUS dos cenários
            const statusColors = {
                'Não Iniciado': { icon: '⏳', css: 'st-aguardando', color: '#e65100' },
                'Cancelado': { icon: '⛔', css: 'st-cancelado', color: '#6a1b9a' },
                'Aprovado': { icon: '✅', css: 'st-homologado', color: '#2e7d32' },
                'Reprovado': { icon: '❌', css: 'st-reprovado', color: '#c62828' },
                'Em execução': { icon: '🔄', css: 'st-em-homologacao', color: '#1565c0' },
                'Bloqueado': { icon: '🚫', css: 'st-cancelado', color: '#6a1b9a' }
            };

            // Gerar cards dinâmicos para cada status encontrado
            let statusCardsHtml = `<div class="section-title">Status dos Cenários — Total: ${totalCenarios} casos</div>`;
            statusCardsHtml += '<div class="status-grid">';
            // Ordenar: primeiro os com mais itens
            const sortedStatuses = Object.entries(cenarioStatusCounts).sort((a, b) => b[1] - a[1]);
            sortedStatuses.forEach(([status, count]) => {
                const config = statusColors[status] || getGenericStatusConfig(status);
                statusCardsHtml += `
                    <div class="status-card ${config.css}">
                        <div class="status-icon">${config.icon}</div>
                        <div class="status-count">${count}</div>
                        <div class="status-label">${status}</div>
                    </div>`;
            });
            statusCardsHtml += '</div>';
            mainContent.innerHTML += statusCardsHtml;

            // SEÇÃO 2 - Progresso geral (reflete realidade)
            const progressSegments = buildProgressSegments(progressStatusCounts, totalCenariosAlocados);
            mainContent.innerHTML += `
                <div class="progress-section">
                    <div class="progress-bar-container">
                        <div class="progress-bar-title">
                            <h3>Progresso Por Homologadores</h3>
                            <span>${progressPercent}%</span>
                        </div>
                        <div class="progress-bar">${progressSegments.bar}</div>
                        <div class="progress-legend">${progressSegments.legend}</div>
                    </div>
                </div>`;

            // SEÇÃO 3 - Homologadores (extraídos da aba cenários)
            // Listar homologadores únicos que aparecem nos cenários
            const homologadoresFromCenarios = [...new Set(
                cenarios.map(c => c.homologador).filter(h => h && h.trim() !== '')
            )];
            mainContent.innerHTML += `<div class="section-title">Homologadores</div>`;
            mainContent.innerHTML += `<div class="homologadores-grid">${buildHomologadoresCards(homologadoresFromCenarios)}</div>`;

            // SEÇÃO 4 - Charts
            mainContent.innerHTML += `
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Cenários por Categoria de Batimento</h3>
                        <div class="chart-container"><canvas id="chartCategoria"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Cenários por Homologador</h3>
                        <div class="chart-container"><canvas id="chartHomologadores"></canvas></div>
                    </div>
                    <div class="chart-card full-width">
                        <h3>Cenários por Grupo</h3>
                        <div class="chart-container"><canvas id="chartGrupo"></canvas></div>
                    </div>
                </div>`;

            // SEÇÃO 5 - Tabela
            mainContent.innerHTML += `
                <div class="table-card">
                    <div class="table-header">
                        <h3>Detalhamento dos Cenários de Homologação</h3>
                        <div class="table-filter">
                            <button class="filter-btn active" data-filter="all">Todos</button>
                            <button class="filter-btn" data-filter="CARACTERIZA_SE">Caracteriza</button>
                            <button class="filter-btn" data-filter="DESCARACTERIZA_SE">Descaracteriza</button>
                            <button class="filter-btn" data-filter="PENDENTE">Pendente</button>
                            <button class="filter-btn" data-filter="NAO_IMPEDITIVO_SE">Não Impeditivo</button>
                            <button class="filter-btn" data-filter="NAO_AVALIADO">Não Avaliado</button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Cenário</th>
                                    <th>Homologador</th>
                                    <th>Status</th>
                                    <th>Descrição</th>
                                    <th>Categoria</th>
                                    <th>Classificação</th>
                                    <th>Motivo</th>
                                    <th>Grupo</th>
                                </tr>
                            </thead>
                            <tbody id="cenarios-tbody"></tbody>
                        </table>
                    </div>
                </div>`;

            window._cenarios = cenarios;
            renderTable('all');

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderTable(this.dataset.filter);
                });
            });

            renderCharts(activeCenarios, cenarios);
        }

        function renderTable(filter) {
            const cenarios = window._cenarios || [];
            const tbody = document.getElementById('cenarios-tbody');
            if (!tbody) return;

            const filtered = filter === 'all' ? cenarios : cenarios.filter(c => c.classificacao === filter);
            tbody.innerHTML = filtered.map(c => {
                const badgeClass = getBadgeClass(c.classificacao);
                const classLabel = c.classificacao.replace(/_/g, ' ');
                return `<tr class="${c.cancelado ? 'cancelado' : ''}">
                    <td><strong>${c.id}</strong>${c.cancelado ? ' ⛔' : ''}</td>
                    <td>${c.homologador || '—'}</td>
                    <td>${c.status || '—'}</td>
                    <td>${c.desc.substring(0, 80)}${c.desc.length > 80 ? '...' : ''}</td>
                    <td>${c.categoria}</td>
                    <td><span class="badge ${badgeClass}">${classLabel}</span></td>
                    <td style="font-size:11px;">${c.motivo || '—'}</td>
                    <td><span class="grupo-tag">${c.grupo}</span></td>
                </tr>`;
            }).join('');
        }

        function getBadgeClass(classificacao) {
            if (classificacao.includes('CARACTERIZA') && !classificacao.includes('DES')) return 'badge-caracteriza';
            if (classificacao.includes('DESCARACTERIZA')) return 'badge-descaracteriza';
            if (classificacao.includes('PENDENTE')) return 'badge-pendente';
            if (classificacao.includes('NAO_IMPEDITIVO')) return 'badge-nao-impeditivo';
            return 'badge-nao-avaliado';
        }

        function normalizeStatus(status) {
            const s = (status || '').toLowerCase().trim();
            if (s.includes('sucesso')) return 'homologado';
            if (s.includes('ressalva')) return 'ressalvas';
            if (s.includes('reprova')) return 'reprovado';
            if (s.includes('cancelado')) return 'cancelado';
            if (s.includes('aguard')) return 'aguardando';
            if (s.includes('homologa')) return 'em-homologacao';
            return 'aguardando';
        }

        function getStatusColor(normalized) {
            const colors = { 'homologado': '#2e7d32', 'ressalvas': '#f57f17', 'em-homologacao': '#1565c0', 'aguardando': '#e65100', 'reprovado': '#c62828', 'cancelado': '#6a1b9a' };
            return colors[normalized] || '#90a4ae';
        }

        function getGenericStatusConfig(status) {
            const s = status.toLowerCase();
            if (s.includes('aprovad') || s.includes('ok') || s.includes('pass')) return { icon: '✅', css: 'st-homologado', color: '#2e7d32' };
            if (s.includes('reprovad') || s.includes('falh') || s.includes('erro')) return { icon: '❌', css: 'st-reprovado', color: '#c62828' };
            if (s.includes('execu') || s.includes('andamento') || s.includes('progress')) return { icon: '🔄', css: 'st-em-homologacao', color: '#1565c0' };
            if (s.includes('cancel') || s.includes('bloqu')) return { icon: '⛔', css: 'st-cancelado', color: '#6a1b9a' };
            if (s.includes('ressalva') || s.includes('parcial')) return { icon: '⚠️', css: 'st-ressalvas', color: '#f57f17' };
            return { icon: '📋', css: 'st-aguardando', color: '#e65100' };
        }

        function getStatusLabel(normalized) {
            const labels = { 'homologado': 'Homologado com sucesso', 'ressalvas': 'Homologado com ressalvas', 'em-homologacao': 'Em Homologação', 'aguardando': 'Aguardando', 'reprovado': 'Reprovado', 'cancelado': 'Cenário cancelado' };
            return labels[normalized] || normalized;
        }

        function buildProgressSegments(statusCounts, total) {
            if (total === 0) return { bar: '', legend: '' };

            const statusColorMap = {
                'Não Iniciado': '#e65100',
                'Cancelado': '#6a1b9a',
                'Aprovado': '#2e7d32',
                'Reprovado': '#c62828',
                'Em execução': '#1565c0',
                'Bloqueado': '#546e7a'
            };

            let bar = '';
            let legend = '';

            // Ordenar: aprovados primeiro, depois em execução, depois não iniciados, etc
            const sorted = Object.entries(statusCounts).sort((a, b) => {
                const order = ['Aprovado', 'Em execução', 'Não Iniciado', 'Reprovado', 'Cancelado', 'Bloqueado'];
                const idxA = order.findIndex(o => a[0].toLowerCase().includes(o.toLowerCase()));
                const idxB = order.findIndex(o => b[0].toLowerCase().includes(o.toLowerCase()));
                return (idxA === -1 ? 99 : idxA) - (idxB === -1 ? 99 : idxB);
            });

            sorted.forEach(([status, count]) => {
                const pct = (count / total * 100).toFixed(1);
                const color = statusColorMap[status] || getProgressColor(status);
                bar += `<div class="progress-segment" style="width: ${pct}%; background: ${color};" title="${status}: ${count}"></div>`;
                legend += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${status} (${count} de ${total})</div>`;
            });

            return { bar, legend };
        }

        function getProgressColor(status) {
            const s = status.toLowerCase();
            if (s.includes('aprovad') || s.includes('sucesso') || s.includes('ok')) return '#2e7d32';
            if (s.includes('reprovad') || s.includes('falh')) return '#c62828';
            if (s.includes('execu') || s.includes('andamento')) return '#1565c0';
            if (s.includes('cancel') || s.includes('bloqu')) return '#6a1b9a';
            if (s.includes('ressalva')) return '#f57f17';
            return '#e65100';
        }

        function buildHomologadoresCards(homologadoresNomes) {
            const avatarColors = [
                'linear-gradient(135deg, #1565c0, #42a5f5)',
                'linear-gradient(135deg, #2e7d32, #66bb6a)',
                'linear-gradient(135deg, #c62828, #ef5350)',
                'linear-gradient(135deg, #6a1b9a, #ab47bc)',
                'linear-gradient(135deg, #e65100, #ff8a65)',
                'linear-gradient(135deg, #f57f17, #ffca28)',
                'linear-gradient(135deg, #00695c, #26a69a)',
                'linear-gradient(135deg, #283593, #5c6bc0)'
            ];

            return homologadoresNomes.map((nome, i) => {
                const initials = nome.split(' ').filter(w => w.length > 2).slice(0, 2).map(w => w[0].toUpperCase()).join('');
                const color = avatarColors[i % avatarColors.length];

                return `<div class="homologador-card">
                    <div class="homologador-avatar" style="background: ${color};">${initials}</div>
                    <div class="homologador-info">
                        <h4>${nome}</h4>
                    </div>
                </div>`;
            }).join('');
        }

        // Charts - TUDO baseado na aba cenários
        function renderCharts(activeCenarios, allCenarios) {
            Object.values(chartInstances).forEach(c => c.destroy());
            chartInstances = {};

            // Chart 1 - Categoria (Bar horizontal)
            const catCount = {};
            activeCenarios.forEach(c => { if (c.categoria) catCount[c.categoria] = (catCount[c.categoria] || 0) + 1; });
            const catLabels = Object.keys(catCount).sort((a, b) => catCount[b] - catCount[a]);

            chartInstances.categoria = new Chart(document.getElementById('chartCategoria'), {
                type: 'bar',
                data: {
                    labels: catLabels,
                    datasets: [{ label: 'Cenários', data: catLabels.map(l => catCount[l]), backgroundColor: '#2980b9', borderRadius: 6, barThickness: 20 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 } } }, y: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 } } } }
                }
            });

            // Chart 2 - Cenários por Homologador (Donut) - baseado na coluna Homologador dos cenários
            const hCount = {};
            allCenarios.forEach(c => {
                const h = c.homologador && c.homologador.trim() !== '' ? c.homologador.trim() : 'Não atribuído';
                hCount[h] = (hCount[h] || 0) + 1;
            });
            const hLabels = Object.keys(hCount).sort((a, b) => hCount[b] - hCount[a]);
            const hColors = ['#1565c0','#2e7d32','#c62828','#6a1b9a','#e65100','#f57f17','#00695c','#283593','#78909c','#ec407a'];

            chartInstances.homologadores = new Chart(document.getElementById('chartHomologadores'), {
                type: 'doughnut',
                data: {
                    labels: hLabels,
                    datasets: [{
                        data: hLabels.map(l => hCount[l]),
                        backgroundColor: hLabels.map((_, i) => hColors[i % hColors.length]),
                        borderWidth: 2, borderColor: '#fff'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, padding: 12 } } } }
            });

            // Chart 3 - Grupo (Bar vertical - full width)
            const grupoCount = {};
            activeCenarios.forEach(c => { if (c.grupo) grupoCount[c.grupo] = (grupoCount[c.grupo] || 0) + 1; });
            const grupoLabels = Object.keys(grupoCount).sort();
            const groupColors = ['#1a5276','#2980b9','#00bcd4','#4dd0e1','#7cb342','#aed581','#f9a825','#f57c00','#ef5350','#ab47bc','#5c6bc0','#26a69a','#78909c','#8d6e63','#ec407a','#42a5f5'];

            chartInstances.grupo = new Chart(document.getElementById('chartGrupo'), {
                type: 'bar',
                data: {
                    labels: grupoLabels.map(g => g.replace('Grupo ', 'G').replace(' - ', ': ')),
                    datasets: [{ label: 'Cenários', data: grupoLabels.map(l => grupoCount[l]), backgroundColor: grupoLabels.map((_, i) => groupColors[i % groupColors.length]), borderRadius: 6 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 10 } } }, y: { grid: { color: '#f3f4f6' }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, stepSize: 1 } } }
                }
            });
        }

        // Init
        loadSpreadsheet();
        setInterval(loadSpreadsheet, REFRESH_INTERVAL);
    </script>
</body>
</html>
