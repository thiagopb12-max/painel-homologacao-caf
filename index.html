<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Homologação - CAF (DM-209196)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --azul-escuro: #1a5276;
            --azul-medio: #2980b9;
            --azul-claro: #5dade2;
            --ciano: #00bcd4;
            --ciano-claro: #4dd0e1;
            --verde: #7cb342;
            --verde-claro: #aed581;
            --amarelo: #f9a825;
            --laranja: #f57c00;
            --cinza-texto: #2d2d2d;
            --cinza-claro: #f5f7fa;
            --branco: #ffffff;
            --sombra: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', 'Segoe UI', Roboto, sans-serif;
            background: var(--cinza-claro);
            color: var(--cinza-texto);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--azul-escuro) 0%, var(--azul-medio) 50%, var(--ciano) 100%);
            color: var(--branco);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }

        .header-logo img {
            height: 56px;
            width: auto;
            filter: brightness(0) invert(1);
        }

        .header-divider { width: 2px; height: 44px; background: rgba(255,255,255,0.3); }
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { font-size: 18px; font-weight: 600; }
        .header-title p { font-size: 13px; opacity: 0.85; font-weight: 300; }
        .header-right { display: flex; align-items: center; gap: 16px; }

        .header-badge {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 12px;
            font-weight: 500;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .header-time { font-size: 13px; opacity: 0.9; }

        .tagline-bar {
            background: linear-gradient(90deg, var(--amarelo), var(--verde-claro));
            padding: 6px 40px;
            font-size: 12px;
            font-weight: 600;
            color: var(--azul-escuro);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main { max-width: 1440px; margin: 0 auto; padding: 32px 40px; }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }

        .loading-spinner {
            width: 48px; height: 48px;
            border: 4px solid #e5e7eb;
            border-top-color: var(--azul-medio);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading p { font-size: 14px; color: #6b7280; }

        .refresh-info {
            background: var(--branco);
            border-radius: var(--radius);
            padding: 12px 24px;
            box-shadow: var(--sombra);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #6b7280;
        }

        .refresh-info button {
            background: var(--azul-medio);
            color: var(--branco);
            border: none;
            border-radius: 8px;
            padding: 8px 20px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
        }

        .refresh-info button:hover { background: var(--azul-escuro); }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--branco);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--sombra);
            border-top: 4px solid var(--azul-medio);
            transition: transform 0.2s;
        }

        .kpi-card:hover { transform: translateY(-2px); }
        .kpi-card.success { border-top-color: var(--verde); }
        .kpi-card.warning { border-top-color: var(--amarelo); }
        .kpi-card.danger { border-top-color: var(--laranja); }
        .kpi-card.info { border-top-color: var(--ciano); }
        .kpi-card.neutral { border-top-color: #90a4ae; }

        .kpi-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #6b7280; margin-bottom: 8px; }
        .kpi-value { font-size: 36px; font-weight: 800; color: var(--azul-escuro); }
        .kpi-detail { font-size: 12px; color: #9ca3af; margin-top: 4px; }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 32px; }

        .chart-card {
            background: var(--branco);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--sombra);
        }

        .chart-card h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e7eb; }
        .chart-container { position: relative; height: 280px; }

        .section-title {
            font-size: 18px; font-weight: 700; color: var(--azul-escuro);
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(180deg, var(--ciano), var(--azul-medio)); border-radius: 2px; }

        .homologadores-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }

        .homologador-card {
            background: var(--branco); border-radius: var(--radius);
            padding: 20px; box-shadow: var(--sombra); display: flex; align-items: center; gap: 16px;
        }

        .homologador-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; font-weight: 700; color: var(--branco); flex-shrink: 0;
        }

        .homologador-info h4 { font-size: 14px; font-weight: 600; color: var(--cinza-texto); }

        .homologador-status {
            display: inline-flex; align-items: center; gap: 6px;
            font-size: 12px; font-weight: 500; margin-top: 4px; padding: 3px 10px; border-radius: 12px;
        }

        .status-em-homologacao { background: #e3f2fd; color: #1565c0; }
        .status-homologado { background: #e8f5e9; color: #2e7d32; }
        .status-reprovado { background: #fbe9e7; color: #c62828; }
        .status-cancelado { background: #f3e5f5; color: #6a1b9a; }
        .status-aguardando { background: #fff3e0; color: #e65100; }
        .status-ressalvas { background: #fff8e1; color: #f57f17; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status-em-homologacao .status-dot { background: #1565c0; }
        .status-homologado .status-dot { background: #2e7d32; }
        .status-reprovado .status-dot { background: #c62828; }
        .status-cancelado .status-dot { background: #6a1b9a; }
        .status-aguardando .status-dot { background: #e65100; }
        .status-ressalvas .status-dot { background: #f57f17; }

        .table-card { background: var(--branco); border-radius: var(--radius); box-shadow: var(--sombra); overflow: hidden; margin-bottom: 32px; }
        .table-header { padding: 20px 24px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
        .table-header h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); }
        .table-filter { display: flex; gap: 8px; flex-wrap: wrap; }

        .filter-btn {
            padding: 6px 14px; border: 1px solid #e5e7eb; border-radius: 20px;
            font-size: 12px; font-weight: 500; cursor: pointer;
            background: var(--branco); color: var(--cinza-texto); font-family: inherit; transition: all 0.2s;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--azul-medio); color: var(--branco); border-color: var(--azul-medio); }

        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead { background: #f8fafc; }
        th { padding: 12px 16px; text-align: left; font-weight: 600; color: #4b5563; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 2px solid #e5e7eb; white-space: nowrap; }
        td { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
        tr:hover { background: #f8fafc; }
        tr.cancelado td { opacity: 0.5; }

        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .badge-caracteriza { background: #e8f5e9; color: #2e7d32; }
        .badge-descaracteriza { background: #fbe9e7; color: #c62828; }
        .badge-pendente { background: #fff3e0; color: #e65100; }
        .badge-nao-impeditivo { background: #e3f2fd; color: #1565c0; }
        .badge-nao-avaliado { background: #f3e5f5; color: #6a1b9a; }

        .grupo-tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; background: #e8eaf6; color: #3949ab; }

        .progress-section { margin-bottom: 32px; }
        .progress-bar-container { background: var(--branco); border-radius: var(--radius); padding: 24px; box-shadow: var(--sombra); }
        .progress-bar-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .progress-bar-title h3 { font-size: 15px; font-weight: 600; color: var(--azul-escuro); }
        .progress-bar-title span { font-size: 24px; font-weight: 800; color: var(--azul-medio); }
        .progress-bar { height: 12px; background: #e5e7eb; border-radius: 6px; overflow: hidden; display: flex; }
        .progress-segment { height: 100%; transition: width 0.5s ease; }
        .progress-legend { display: flex; gap: 20px; margin-top: 12px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #6b7280; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        .footer {
            background: var(--azul-escuro); color: rgba(255,255,255,0.7);
            text-align: center; padding: 20px 40px; font-size: 12px;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .footer img { height: 28px; filter: brightness(0) invert(1); }
        .footer strong { color: var(--branco); }

        @media (max-width: 1024px) { .charts-grid { grid-template-columns: 1fr; } }
        @media (max-width: 768px) { .header { flex-direction: column; gap: 16px; padding: 20px; } .main { padding: 20px; } .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <div class="header-logo">
                <img src="Logo_dataprev_Preferencial-01.jpg" alt="DATAPREV">
            </div>
            <div class="header-divider"></div>
            <div class="header-title">
                <h1>Painel de Homologação — CAF</h1>
                <p>Cadastro Nacional da Agricultura Familiar • DM-209196</p>
            </div>
        </div>
        <div class="header-right">
            <div class="header-badge">🔴 AO VIVO</div>
            <div class="header-time" id="current-time"></div>
        </div>
    </header>

    <div class="tagline-bar">
        <span>Dados para cidadania</span>
        <span>•</span>
        <span>Acompanhamento em tempo real da homologação</span>
    </div>

    <main class="main" id="main-content">
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Carregando dados da planilha...</p>
        </div>
    </main>

    <footer class="footer">
        <img src="Logo_dataprev_Preferencial-01.jpg" alt="DATAPREV">
        <p><strong>DATAPREV</strong> — Dados para cidadania • Homologação CAF DM-209196 • Atualizado em <span id="footer-time"></span></p>
    </footer>

    <script>
        // ============================================
        // CONFIGURAÇÃO
        // ============================================
        const XLSX_FILE = 'CAF.xlsx';
        const REFRESH_INTERVAL = 30000; // 30 segundos

        let chartInstances = {};
        let currentFilter = 'all';

        // ============================================
        // CLOCK
        // ============================================
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'medium' });
            const el1 = document.getElementById('current-time');
            const el2 = document.getElementById('footer-time');
            if (el1) el1.textContent = timeStr;
            if (el2) el2.textContent = timeStr;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // ============================================
        // LOAD AND PARSE XLSX
        // ============================================
        async function loadSpreadsheet() {
            try {
                const response = await fetch(XLSX_FILE + '?t=' + Date.now());
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });

                // Parse sheets
                const cenariosData = parseSheetCenarios(workbook);
                const homologadoresData = parseSheetHomologadores(workbook);

                renderDashboard(cenariosData, homologadoresData);
            } catch (error) {
                console.error('Erro ao carregar planilha:', error);
                document.getElementById('main-content').innerHTML = `
                    <div class="loading">
                        <p style="color: #c62828; font-weight: 600;">❌ Erro ao carregar a planilha</p>
                        <p>${error.message}</p>
                        <p style="margin-top: 12px; font-size: 12px; color: #6b7280;">
                            Certifique-se de que o arquivo <strong>CAF.xlsx</strong> está na mesma pasta e que o painel está sendo servido via HTTP.<br>
                            Execute: <code>python -m http.server 8080</code> na pasta do projeto e acesse <code>http://localhost:8080</code>
                        </p>
                    </div>`;
            }
        }

        function parseSheetCenarios(workbook) {
            // Try to find the cenários sheet
            const sheetName = workbook.SheetNames.find(n =>
                n.toLowerCase().includes('cen') || n.toLowerCase().includes('homologa')
            ) || workbook.SheetNames[0];

            const sheet = workbook.Sheets[sheetName];
            const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });

            const cenarios = [];
            for (const row of json) {
                // Try to find the cenário number column
                const numero = row['Número do Cenário'] || row['Numero do Cenario'] || row['Cenário'] || row['Cenario'] || '';
                if (!numero || !numero.toString().startsWith('CT-')) continue;

                const status = (row['Status'] || '').toString().trim();
                const canceladoCol = Object.keys(row).find(k => k.trim() === 'X' || row[k] === 'CANCELADO');
                const isCancelado = status.toUpperCase().includes('CANCELADO') ||
                    Object.values(row).some(v => v && v.toString().toUpperCase().includes('CANCELADO'));

                cenarios.push({
                    id: numero.toString().trim(),
                    homologador: (row['Homologador'] || '').toString().trim(),
                    status: status,
                    desc: (row['Descrição'] || row['Descricao'] || '').toString().trim(),
                    categoria: (row['Categoria do Batimento'] || row['Categoria'] || '').toString().trim(),
                    classificacao: (row['Classificação Esperada'] || row['Classificacao Esperada'] || '').toString().trim(),
                    motivo: (row['Motivo Esperado'] || row['Motivo'] || '').toString().trim(),
                    grupo: (row['Grupo Sugerido'] || row['Grupo'] || '').toString().trim(),
                    justificativa: (row['Justificativa de Inclusão'] || row['Justificativa'] || '').toString().trim(),
                    cancelado: isCancelado
                });
            }
            return cenarios;
        }

        function parseSheetHomologadores(workbook) {
            // Try to find the homologadores sheet
            const sheetName = workbook.SheetNames.find(n =>
                n.toLowerCase().includes('homologador')
            );

            // If there's a separate sheet, parse it
            if (sheetName) {
                const sheet = workbook.Sheets[sheetName];
                const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });
                return json.filter(r => r['Nome']).map(r => ({
                    nome: r['Nome'] || '',
                    status: r['Status'] || ''
                }));
            }

            // Otherwise look in the same sheet — try second table area
            // Parse all sheets looking for "Homologadores" header
            for (const sn of workbook.SheetNames) {
                const sheet = workbook.Sheets[sn];
                const allData = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });

                for (let i = 0; i < allData.length; i++) {
                    const row = allData[i];
                    if (row && row.some(cell => cell && cell.toString().toLowerCase().includes('homologador'))) {
                        // Check if next rows have Nome/Status pattern
                        const headerRow = allData[i];
                        const nomeIdx = headerRow.findIndex(c => c && c.toString().toLowerCase() === 'nome');
                        const statusIdx = headerRow.findIndex(c => c && c.toString().toLowerCase() === 'status');

                        if (nomeIdx >= 0 && statusIdx >= 0) {
                            const homologadores = [];
                            for (let j = i + 1; j < allData.length; j++) {
                                const r = allData[j];
                                if (!r || !r[nomeIdx]) break;
                                homologadores.push({
                                    nome: r[nomeIdx].toString().trim(),
                                    status: (r[statusIdx] || '').toString().trim()
                                });
                            }
                            if (homologadores.length > 0) return homologadores;
                        }
                    }
                }
            }

            // Fallback: extract from known data
            return [
                { nome: 'Nicole Campos Otani', status: 'Em Homologação' },
                { nome: 'João Renato Sardinha Antunes', status: 'Homologado com sucesso' },
                { nome: 'Marcelo Caetano Figueredo Santana', status: 'Reprovado' },
                { nome: 'Graziella Sales Xavier', status: 'Cenário cancelado' },
                { nome: 'Gregorio Vinicius de Oliveira Bispo Dias', status: 'Aguardando' },
                { nome: 'Walternilson Guimarães de Souza', status: 'Homologado com ressalvas' }
            ];
        }

        // ============================================
        // RENDER DASHBOARD
        // ============================================
        function renderDashboard(cenarios, homologadores) {
            const activeCenarios = cenarios.filter(c => !c.cancelado);
            const cancelados = cenarios.filter(c => c.cancelado);

            // Status counts for homologadores
            const statusCounts = {};
            homologadores.forEach(h => {
                const s = normalizeStatus(h.status);
                statusCounts[s] = (statusCounts[s] || 0) + 1;
            });

            const concluidos = (statusCounts['homologado'] || 0) + (statusCounts['ressalvas'] || 0);
            const totalHomologadores = homologadores.length;
            const progressPercent = totalHomologadores > 0 ? Math.round((concluidos / totalHomologadores) * 100) : 0;

            const mainContent = document.getElementById('main-content');
            mainContent.innerHTML = '';

            // Refresh info
            mainContent.innerHTML += `
                <div class="refresh-info">
                    <span>📊 Dados carregados de <strong>CAF.xlsx</strong> — Atualização automática a cada 30s</span>
                    <button onclick="loadSpreadsheet()">🔄 Atualizar Agora</button>
                </div>`;

            // KPIs
            mainContent.innerHTML += `
                <div class="kpi-grid">
                    <div class="kpi-card info">
                        <div class="kpi-label">Total de Cenários</div>
                        <div class="kpi-value">${cenarios.length}</div>
                        <div class="kpi-detail">Cenários de teste planejados</div>
                    </div>
                    <div class="kpi-card success">
                        <div class="kpi-label">Ativos (A Homologar)</div>
                        <div class="kpi-value">${activeCenarios.length}</div>
                        <div class="kpi-detail">Cenários válidos para execução</div>
                    </div>
                    <div class="kpi-card warning">
                        <div class="kpi-label">Cancelados</div>
                        <div class="kpi-value">${cancelados.length}</div>
                        <div class="kpi-detail">${cancelados.map(c => c.id).join(', ') || 'Nenhum'}</div>
                    </div>
                    <div class="kpi-card neutral">
                        <div class="kpi-label">Homologadores</div>
                        <div class="kpi-value">${totalHomologadores}</div>
                        <div class="kpi-detail">Atribuídos ao processo</div>
                    </div>
                    <div class="kpi-card success">
                        <div class="kpi-label">Concluídos</div>
                        <div class="kpi-value">${concluidos}</div>
                        <div class="kpi-detail">Homologados (sucesso + ressalvas)</div>
                    </div>
                    <div class="kpi-card danger">
                        <div class="kpi-label">Reprovados</div>
                        <div class="kpi-value">${statusCounts['reprovado'] || 0}</div>
                        <div class="kpi-detail">Necessita retrabalho</div>
                    </div>
                </div>`;

            // Progress
            const progressSegments = buildProgressSegments(homologadores);
            mainContent.innerHTML += `
                <div class="progress-section">
                    <div class="progress-bar-container">
                        <div class="progress-bar-title">
                            <h3>Progresso Geral dos Homologadores</h3>
                            <span>${progressPercent}%</span>
                        </div>
                        <div class="progress-bar">${progressSegments.bar}</div>
                        <div class="progress-legend">${progressSegments.legend}</div>
                    </div>
                </div>`;

            // Charts
            mainContent.innerHTML += `
                <div class="charts-grid">
                    <div class="chart-card">
                        <h3>Distribuição por Classificação Esperada</h3>
                        <div class="chart-container"><canvas id="chartClassificacao"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Cenários por Categoria de Batimento</h3>
                        <div class="chart-container"><canvas id="chartCategoria"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Cenários por Grupo</h3>
                        <div class="chart-container"><canvas id="chartGrupo"></canvas></div>
                    </div>
                    <div class="chart-card">
                        <h3>Status dos Homologadores</h3>
                        <div class="chart-container"><canvas id="chartHomologadores"></canvas></div>
                    </div>
                </div>`;

            // Homologadores
            mainContent.innerHTML += `<div class="section-title">Homologadores</div>`;
            mainContent.innerHTML += `<div class="homologadores-grid">${buildHomologadoresCards(homologadores)}</div>`;

            // Table
            mainContent.innerHTML += `
                <div class="table-card">
                    <div class="table-header">
                        <h3>Detalhamento dos Cenários de Homologação</h3>
                        <div class="table-filter">
                            <button class="filter-btn active" data-filter="all">Todos</button>
                            <button class="filter-btn" data-filter="CARACTERIZA_SE">Caracteriza</button>
                            <button class="filter-btn" data-filter="DESCARACTERIZA_SE">Descaracteriza</button>
                            <button class="filter-btn" data-filter="PENDENTE">Pendente</button>
                            <button class="filter-btn" data-filter="NAO_IMPEDITIVO_SE">Não Impeditivo</button>
                            <button class="filter-btn" data-filter="NAO_AVALIADO">Não Avaliado</button>
                        </div>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Cenário</th>
                                    <th>Homologador</th>
                                    <th>Status</th>
                                    <th>Descrição</th>
                                    <th>Categoria</th>
                                    <th>Classificação</th>
                                    <th>Motivo</th>
                                    <th>Grupo</th>
                                </tr>
                            </thead>
                            <tbody id="cenarios-tbody"></tbody>
                        </table>
                    </div>
                </div>`;

            // Render table
            window._cenarios = cenarios;
            renderTable('all');

            // Bind filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderTable(this.dataset.filter);
                });
            });

            // Render charts
            renderCharts(activeCenarios, homologadores);
        }

        function renderTable(filter) {
            const cenarios = window._cenarios || [];
            const tbody = document.getElementById('cenarios-tbody');
            if (!tbody) return;

            const filtered = filter === 'all' ? cenarios : cenarios.filter(c => c.classificacao === filter);
            tbody.innerHTML = filtered.map(c => {
                const badgeClass = getBadgeClass(c.classificacao);
                const classLabel = c.classificacao.replace(/_/g, ' ');
                return `<tr class="${c.cancelado ? 'cancelado' : ''}">
                    <td><strong>${c.id}</strong>${c.cancelado ? ' ⛔' : ''}</td>
                    <td>${c.homologador || '—'}</td>
                    <td>${c.status || '—'}</td>
                    <td>${c.desc.substring(0, 80)}${c.desc.length > 80 ? '...' : ''}</td>
                    <td>${c.categoria}</td>
                    <td><span class="badge ${badgeClass}">${classLabel}</span></td>
                    <td style="font-size:11px;">${c.motivo || '—'}</td>
                    <td><span class="grupo-tag">${c.grupo}</span></td>
                </tr>`;
            }).join('');
        }

        function getBadgeClass(classificacao) {
            if (classificacao.includes('CARACTERIZA') && !classificacao.includes('DES')) return 'badge-caracteriza';
            if (classificacao.includes('DESCARACTERIZA')) return 'badge-descaracteriza';
            if (classificacao.includes('PENDENTE')) return 'badge-pendente';
            if (classificacao.includes('NAO_IMPEDITIVO')) return 'badge-nao-impeditivo';
            if (classificacao.includes('NAO_AVALIADO')) return 'badge-nao-avaliado';
            return 'badge-nao-avaliado';
        }

        function normalizeStatus(status) {
            const s = status.toLowerCase().trim();
            if (s.includes('sucesso')) return 'homologado';
            if (s.includes('ressalva')) return 'ressalvas';
            if (s.includes('reprova')) return 'reprovado';
            if (s.includes('cancelado')) return 'cancelado';
            if (s.includes('aguard')) return 'aguardando';
            if (s.includes('homologa')) return 'em-homologacao';
            return 'aguardando';
        }

        function getStatusColor(normalized) {
            const colors = {
                'homologado': '#2e7d32',
                'ressalvas': '#f57f17',
                'em-homologacao': '#1565c0',
                'aguardando': '#e65100',
                'reprovado': '#c62828',
                'cancelado': '#6a1b9a'
            };
            return colors[normalized] || '#90a4ae';
        }

        function getStatusLabel(normalized) {
            const labels = {
                'homologado': 'Homologado com sucesso',
                'ressalvas': 'Homologado com ressalvas',
                'em-homologacao': 'Em Homologação',
                'aguardando': 'Aguardando',
                'reprovado': 'Reprovado',
                'cancelado': 'Cenário cancelado'
            };
            return labels[normalized] || normalized;
        }

        function getStatusCssClass(normalized) {
            const classes = {
                'homologado': 'status-homologado',
                'ressalvas': 'status-ressalvas',
                'em-homologacao': 'status-em-homologacao',
                'aguardando': 'status-aguardando',
                'reprovado': 'status-reprovado',
                'cancelado': 'status-cancelado'
            };
            return classes[normalized] || 'status-aguardando';
        }

        function buildProgressSegments(homologadores) {
            const total = homologadores.length;
            if (total === 0) return { bar: '', legend: '' };

            const counts = {};
            homologadores.forEach(h => {
                const s = normalizeStatus(h.status);
                counts[s] = (counts[s] || 0) + 1;
            });

            let bar = '';
            let legend = '';
            const completedStatuses = ['homologado', 'ressalvas', 'reprovado'];

            for (const [status, count] of Object.entries(counts)) {
                const pct = (count / total * 100).toFixed(1);
                const color = getStatusColor(status);
                const label = getStatusLabel(status);
                if (completedStatuses.includes(status)) {
                    bar += `<div class="progress-segment" style="width: ${pct}%; background: ${color};"></div>`;
                }
                legend += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${label} (${count})</div>`;
            }

            return { bar, legend };
        }

        function buildHomologadoresCards(homologadores) {
            const avatarColors = [
                'linear-gradient(135deg, #1565c0, #42a5f5)',
                'linear-gradient(135deg, #2e7d32, #66bb6a)',
                'linear-gradient(135deg, #c62828, #ef5350)',
                'linear-gradient(135deg, #6a1b9a, #ab47bc)',
                'linear-gradient(135deg, #e65100, #ff8a65)',
                'linear-gradient(135deg, #f57f17, #ffca28)',
                'linear-gradient(135deg, #00695c, #26a69a)',
                'linear-gradient(135deg, #283593, #5c6bc0)'
            ];

            return homologadores.map((h, i) => {
                const initials = h.nome.split(' ').filter(w => w.length > 2).slice(0, 2).map(w => w[0].toUpperCase()).join('');
                const normalized = normalizeStatus(h.status);
                const cssClass = getStatusCssClass(normalized);
                const label = getStatusLabel(normalized);
                const color = avatarColors[i % avatarColors.length];

                return `<div class="homologador-card">
                    <div class="homologador-avatar" style="background: ${color};">${initials}</div>
                    <div class="homologador-info">
                        <h4>${h.nome}</h4>
                        <div class="homologador-status ${cssClass}"><div class="status-dot"></div>${label}</div>
                    </div>
                </div>`;
            }).join('');
        }

        // ============================================
        // CHARTS
        // ============================================
        function renderCharts(activeCenarios, homologadores) {
            // Destroy existing
            Object.values(chartInstances).forEach(c => c.destroy());
            chartInstances = {};

            // Chart 1 - Classificação (Donut)
            const classCount = {};
            activeCenarios.forEach(c => { classCount[c.classificacao] = (classCount[c.classificacao] || 0) + 1; });

            chartInstances.classificacao = new Chart(document.getElementById('chartClassificacao'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(classCount).map(k => k.replace(/_/g, ' ')),
                    datasets: [{
                        data: Object.values(classCount),
                        backgroundColor: Object.keys(classCount).map(k => {
                            if (k.includes('CARACTERIZA') && !k.includes('DES')) return '#2e7d32';
                            if (k.includes('DESCARACTERIZA')) return '#c62828';
                            if (k.includes('PENDENTE')) return '#e65100';
                            if (k.includes('NAO_IMPEDITIVO')) return '#1565c0';
                            return '#6a1b9a';
                        }),
                        borderWidth: 2, borderColor: '#fff'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, padding: 12 } } } }
            });

            // Chart 2 - Categoria (Bar horizontal)
            const catCount = {};
            activeCenarios.forEach(c => { if (c.categoria) catCount[c.categoria] = (catCount[c.categoria] || 0) + 1; });
            const catLabels = Object.keys(catCount).sort((a, b) => catCount[b] - catCount[a]);

            chartInstances.categoria = new Chart(document.getElementById('chartCategoria'), {
                type: 'bar',
                data: {
                    labels: catLabels,
                    datasets: [{ label: 'Cenários', data: catLabels.map(l => catCount[l]), backgroundColor: '#2980b9', borderRadius: 6, barThickness: 20 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, indexAxis: 'y',
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 } } }, y: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 } } } }
                }
            });

            // Chart 3 - Grupo (Bar vertical)
            const grupoCount = {};
            activeCenarios.forEach(c => { if (c.grupo) grupoCount[c.grupo] = (grupoCount[c.grupo] || 0) + 1; });
            const grupoLabels = Object.keys(grupoCount).sort();
            const groupColors = ['#1a5276','#2980b9','#00bcd4','#4dd0e1','#7cb342','#aed581','#f9a825','#f57c00','#ef5350','#ab47bc','#5c6bc0','#26a69a','#78909c','#8d6e63','#ec407a','#42a5f5'];

            chartInstances.grupo = new Chart(document.getElementById('chartGrupo'), {
                type: 'bar',
                data: {
                    labels: grupoLabels.map(g => g.replace('Grupo ', 'G')),
                    datasets: [{ label: 'Cenários', data: grupoLabels.map(l => grupoCount[l]), backgroundColor: grupoLabels.map((_, i) => groupColors[i % groupColors.length]), borderRadius: 6, barThickness: 20 }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { font: { family: 'Plus Jakarta Sans', size: 10 } } }, y: { grid: { color: '#f3f4f6' }, ticks: { font: { family: 'Plus Jakarta Sans', size: 11 }, stepSize: 1 } } }
                }
            });

            // Chart 4 - Homologadores status
            const hStatusCount = {};
            homologadores.forEach(h => {
                const s = getStatusLabel(normalizeStatus(h.status));
                hStatusCount[s] = (hStatusCount[s] || 0) + 1;
            });

            chartInstances.homologadores = new Chart(document.getElementById('chartHomologadores'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(hStatusCount),
                    datasets: [{
                        data: Object.values(hStatusCount),
                        backgroundColor: Object.keys(hStatusCount).map(label => {
                            if (label.includes('sucesso')) return '#2e7d32';
                            if (label.includes('ressalvas')) return '#f57f17';
                            if (label.includes('Homologação')) return '#1565c0';
                            if (label.includes('Aguardando')) return '#e65100';
                            if (label.includes('Reprovado')) return '#c62828';
                            if (label.includes('cancelado')) return '#6a1b9a';
                            return '#90a4ae';
                        }),
                        borderWidth: 2, borderColor: '#fff'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', size: 11 }, padding: 12 } } } }
            });
        }

        // ============================================
        // INIT
        // ============================================
        loadSpreadsheet();

        // Auto-refresh every 30 seconds
        setInterval(loadSpreadsheet, REFRESH_INTERVAL);
    </script>
</body>
</html>
